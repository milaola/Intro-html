<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apply Today</title>
  </head>
  <body>
    <form action="http://127.0.0.1:5500/index.html">
      <h3>Apply to be a writer</h3>
      <p>We are looking for passionate writers to join our team.</p>
      <label for="First Name">First Name :</label>
      <input type="text" required placeholder="Nelson" />
      <br />
      <label for="Last Name">Last Name:</label>
      <input type="text" required placeholder="Mendoza" />
      <br />
      <label for="Password">Password:</label>
      <input type="password" required placeholder="********" />
      <br />
      <label for="Phone Number">Phone Number:</label>
      <input type="tel" required placeholder="(123) 456-7890" maxlength="12" />
      <br />
      <label for="Email">Email:</label>
      <input type="email" required placeholder="nelson.mendoza@example.com" />
      <br />
      <label for="Date of Birth">Date of Birth:</label>
      <input type="date" required />
      <br />
      <select required>
        <option>what is your role</option>
        <option value="Writer">Writer</option>
        <option value="Editor">Editor</option>
        <option value="Other">Other</option>
      </select>
      <div>
        <label for="gender">What is your gender?</label>
        <input type="radio" name="gender" value="Female" />
        <label for="female">Female</label>
        <input type="radio" name="gender" value="Male" />
        <label for="male">Male</label>
        <input type="radio" name="gender" value="I'd rather not say" />
        <label for="NotSay">Rather not say</label>
      </div>
      <label for="message">Why do you want to join our team?</label>
      <br />
      <textarea
        name="message"
        id="message"
        cols="30"
        rows="10"
        placeholder="I want to join your team because..."
      ></textarea>
      <br />
      <button>Complete Application</button>
    </form>
  </body>
</html>
